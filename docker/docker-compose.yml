# ==============================================================
# BookBrain Docker Compose — One-click NAS / Linux deployment
#
# Quick start:
#   1. Adjust the ebook volume path below to match your system:
#        Synology NAS : /volume1/ebooks
#        QNAP NAS     : /share/ebooks
#        TrueNAS      : /mnt/pool/ebooks
#        Linux / macOS: /home/user/ebooks  (or any local path)
#        Windows      : C:\Users\user\ebooks
#   2. Run: docker-compose up -d
#   3. Open http://<host-ip>:8000 in your browser
#
# Data persistence:
#   - bookbrain_data volume stores the SQLite database, extracted
#     cover images, and FAISS vector index across container restarts
#   - Ebook files are mounted read-only (:ro) — BookBrain never
#     modifies your original files
# ==============================================================

version: "3.8"

services:
  bookbrain:
    build:
      context: ..                    # Build context is the repo root
      dockerfile: docker/Dockerfile  # Path to the Dockerfile
    container_name: bookbrain
    ports:
      - "8000:8000"                  # Expose the API and web UI
    volumes:
      # Mount your ebook directory — adjust the host path (left side) for your platform:
      #   Synology NAS : /volume1/ebooks:/ebooks:ro
      #   QNAP NAS     : /share/ebooks:/ebooks:ro
      #   TrueNAS      : /mnt/pool/ebooks:/ebooks:ro
      #   Linux / macOS: /home/user/ebooks:/ebooks:ro
      - /volume1/ebooks:/ebooks:ro
      # Named volume for persistent data (DB, covers, FAISS index)
      - bookbrain_data:/data
    environment:
      - BOOKBRAIN_EBOOK_DIRS=/ebooks           # Directories to scan (inside container)
      - BOOKBRAIN_OCR_ENABLED=true             # Enable OCR for scanned PDFs
      # EasyOCR language codes — use '+' as separator (NOT Tesseract format)
      # Common codes: ch_sim (Simplified Chinese), en (English), ja (Japanese), ko (Korean)
      - BOOKBRAIN_OCR_LANGUAGE=ch_sim+en
      - BOOKBRAIN_MAX_WORKERS=4                # Parallel processing threads
      - BOOKBRAIN_DEBUG=false                  # Set to true for verbose logging
    restart: unless-stopped                    # Auto-restart on crash or NAS reboot
    healthcheck:
      # Simple health check: hit the root endpoint.
      # start_period gives the app time to load ML models on first start;
      # increase to 120s on low-memory NAS devices (< 2 GB RAM).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  bookbrain_data:
    driver: local  # Uses the default local storage driver
